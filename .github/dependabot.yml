version: 2
updates:
  - package-ecosystem: npm
    directory: /website
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      website:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      actions:
        patterns:
          - "*"
