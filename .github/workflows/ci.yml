name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  MISE_LOCKED: "1"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflows:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
      - run: mise run ci:workflows

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
      - run: "mise run format:check ::: lint"

  package:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
      - run: mise run test:package

  website:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
      - run: bun install --frozen-lockfile
        working-directory: website
      - run: bunx --bun playwright install --with-deps chromium
        working-directory: website
      - run: "mise run typecheck ::: test:web ::: test:browser"

  linux:
    name: Linux / tmux ${{ matrix.tmux }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    strategy:
      fail-fast: false
      matrix:
        tmux:
          - 3.2a
          - 3.4
          - 3.6b
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            bison \
            build-essential \
            libevent-dev \
            libncurses-dev \
            pkg-config
      - name: Build tmux
        env:
          TMUX_VERSION: ${{ matrix.tmux }}
        run: |
          case "$TMUX_VERSION" in
            3.2a) sha256=551553a4f82beaa8dadc9256800bcc284d7c000081e47aa6ecbb6ff36eacd05f ;;
            3.4) sha256=551ab8dea0bf505c0ad6b7bb35ef567cdde0ccb84357df142c254f35a23e19aa ;;
            3.6b) sha256=390759d25fdba016887ec982b808927e637070fd7d03a8021f8ef3102b9ae3c7 ;;
            *) echo "unknown tmux version: $TMUX_VERSION" >&2; exit 1 ;;
          esac
          curl --fail --location --silent --show-error \
            "https://github.com/tmux/tmux/releases/download/${TMUX_VERSION}/tmux-${TMUX_VERSION}.tar.gz" \
            --output /tmp/tmux.tar.gz
          echo "$sha256  /tmp/tmux.tar.gz" | sha256sum --check
          mkdir /tmp/tmux-src
          tar -xzf /tmp/tmux.tar.gz \
            --strip-components=1 \
            --directory /tmp/tmux-src
          cd /tmp/tmux-src
          ./configure --prefix="${HOME}/.local"
          make -j2
          make install
      - run: mise run test:tmux

  macos:
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
      - run: brew install tmux
      - run: mise run test:tmux
